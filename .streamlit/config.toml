[server]
# Researchers upload data files; allow a comfortable size, keep usage stats off.
maxUploadSize = 50
enableXsrfProtection = true
gatherUsageStats = false

[browser]
gatherUsageStats = false

# Dark theme matched to the Kaelith / Sciverse platform (sciverse111.netlify.app)
[theme]
base = "dark"
primaryColor = "#2563FF"
backgroundColor = "#0A0F1E"
secondaryBackgroundColor = "#111A2E"
textColor = "#E6F1FF"
font = "sans serif"
